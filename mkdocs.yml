site_name: Arch + Hyprland Setup
site_description: Personal reference for an Arch Linux + Hyprland (caelestia) workstation — file layout, settings, customizations, troubleshooting.
site_url: https://glitchydreamer.github.io/arch-hyprland-setup/
repo_url: https://github.com/glitchydreamer/arch-hyprland-setup
repo_name: glitchydreamer/arch-hyprland-setup
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Learning Path:
      - Start here — the big picture: learn/index.md
      - 1. Arch Linux & pacman: learn/01-arch-and-pacman.md
      - 2. Wayland & Hyprland: learn/02-wayland-and-hyprland.md
      - 3. The caelestia shell: learn/03-caelestia-shell.md
      - 4. Displays — resolution, refresh, HDR: learn/04-displays.md
      - 5. NVIDIA on Linux: learn/05-nvidia.md
      - 6. Audio on Linux: learn/06-audio.md
      - 7. The developer environment: learn/07-dev-environment.md
      - 8. Reproducibility & the scripts: learn/08-reproducibility.md
      - 9. The troubleshooting mindset: learn/09-troubleshooting-mindset.md
      - 10. Package management cheat-sheet: learn/10-package-management.md
      - 11. System maintenance & upgrades: learn/11-system-maintenance.md
      - 12. fastfetch with a custom image/GIF/video: learn/12-fastfetch-logo.md
      - 13. iPad/Android tablet as a drawing pad (Weylus): learn/13-weylus-tablet.md
      - Glossary: learn/glossary.md
  - Full Reference: reference.md
  - Guides:
      - Coming from Ubuntu: coming-from-ubuntu.md
      - Display setup: display.md
      - Keybinds: keybinds.md
  - Project context: project-context.md

theme:
  name: material
  language: en
  icon:
    logo: material/penguin
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/glitchydreamer
  generator: false

extra_css:
  - assets/extra.css

copyright: Personal documentation — no warranty, your mileage may vary.
