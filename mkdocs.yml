site_name: Hyprland Rice (multi-distro)
site_description: Personal reference + reproducibility scripts for a Hyprland (caelestia) workstation across distros — Arch Linux and CachyOS. Shared learning core, per-distro specifics (packages, NVIDIA, bootloader).
site_url: https://glitchydreamer.github.io/hyprland-rice/
repo_url: https://github.com/glitchydreamer/hyprland-rice
repo_name: glitchydreamer/hyprland-rice
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Common — Learning Path:
      - Start here — the big picture: common/index.md
      - Wayland & Hyprland: common/wayland-and-hyprland.md
      - The caelestia shell: common/caelestia-shell.md
      - Displays — resolution, refresh, HDR: common/displays.md
      - NVIDIA on Linux (concepts): common/nvidia.md
      - Audio on Linux: common/audio.md
      - The developer environment: common/dev-environment.md
      - Reproducibility & the scripts: common/reproducibility.md
      - The troubleshooting mindset: common/troubleshooting-mindset.md
      - fastfetch with a custom image/GIF/video: common/fastfetch-logo.md
      - iPad/Android tablet as a drawing pad (Weylus): common/weylus-tablet.md
      - Virtual machines (QEMU/KVM + virt-manager): common/virtual-machines.md
      - Coming from Ubuntu: common/coming-from-ubuntu.md
      - Glossary: common/glossary.md
  - Arch Linux:
      - Overview & project context: arch/project-context.md
      - Arch Linux & pacman: arch/arch-and-pacman.md
      - NVIDIA driver management: arch/nvidia.md
      - Package management cheat-sheet: arch/package-management.md
      - System maintenance & upgrades: arch/system-maintenance.md
      - Display setup: arch/display.md
      - Keybinds: arch/keybinds.md
      - Full reference: arch/reference.md
  - CachyOS:
      - Overview & project context: cachyos/project-context.md
      - CachyOS & pacman: cachyos/cachyos-and-pacman.md
      - NVIDIA driver management: cachyos/nvidia.md
      - Package management cheat-sheet: cachyos/package-management.md
      - System maintenance & upgrades: cachyos/system-maintenance.md
      - Display setup: cachyos/display.md
      - Keybinds: cachyos/keybinds.md
      - Full reference: cachyos/reference.md

theme:
  name: material
  language: en
  icon:
    logo: material/penguin
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/glitchydreamer
  generator: false

extra_css:
  - assets/extra.css

copyright: Personal documentation — no warranty, your mileage may vary.
